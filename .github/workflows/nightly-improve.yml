name: Nightly Autonomous Site Improvement

# Runs every day at 03:00 America/Denver. GitHub cron is UTC, so 09:00 UTC.
on:
  schedule:
    - cron: "0 9 * * *"   # 03:00 MDT (UTC-6)
  workflow_dispatch: {}    # lets you trigger a run manually from the Actions tab

# Prevent two nightly runs from overlapping if one runs long.
concurrency:
  group: nightly-improve
  cancel-in-progress: false

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write        # push commits to main
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend deps (so agents can build/lint/test)
        working-directory: frontend
        run: npm install

      - name: Configure Git identity
        run: |
          git config --global user.name "swiftshift-nightly[bot]"
          git config --global user.email "swiftshift-nightly@users.noreply.github.com"

      - name: Run autonomous improvement agents
        id: improve
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-fable-5
            --max-turns 200
            --allowedTools Bash,Read,Edit,Write,Glob,Grep,Task,TodoWrite
          prompt: |
            You are running fully autonomously in a GitHub Actions runner for the
            SwiftShift repository. There is NO human watching and NO one to approve
            anything. Do not ask questions — complete the whole job end to end and
            finish by pushing to `main`.

            ## Deploy contract
            The live site (https://swiftshift.work) is hosted on RENDER, which
            auto-deploys every push to `main`. So the final step of a successful run
            is: `git add -A`, `git commit -m "<concise message>"`, `git push origin main`.
            A push to main = a live deploy. Treat that seriously.

            ## Your mission (do ALL of it)
            1. EXPLORE WITH ~30 CHEAP AGENTS: Use the Task tool to spawn a team of
               about THIRTY independent sub-agents, run in parallel batches (e.g. 6-8
               at a time so you don't exhaust resources). NEVER spawn default-model
               (Fable) sub-agents — use the agents defined in `.claude/agents/`:
               `code-scout` (Haiku) for mechanical sweeps (copy/microcopy, dead code
               and duplication, simple accessibility attribute scans, dead
               links/assets) and `code-analyst` (Sonnet) for judgment-heavy areas
               (correctness, security, performance, UX flows, error handling). Give
               each agent its OWN focus area so coverage is broad. Spread them
               across, at minimum:
                 - Visual / UI polish (spacing, alignment, color, hierarchy)
                 - UX & logistics (flows, navigation, confusing steps, empty/loading/error states)
                 - Accessibility (WCAG: labels, contrast, keyboard, focus, ARIA)
                 - Performance (bundle size, re-renders, expensive work, images)
                 - Frontend correctness (React/TypeScript bugs, edge cases) under `frontend/`
                 - Backend correctness (Flask) under `backend/`
                 - Error handling & input validation
                 - Mobile / responsive behavior
                 - Copy, clarity, and microcopy
                 - Dead code, duplication, and small refactors
               Each agent independently hunts for concrete, high-value issues and
               reports specific findings (file + line + proposed fix).
            2. PLAN: Consolidate all findings into one ranked list. Pick a handful of
               safe, genuinely valuable changes for tonight. Prefer several small,
               low-risk wins over one big risky rewrite. Make the smallest change that
               delivers each improvement.
            3. IMPLEMENT the chosen changes.
            4. REVIEW WITH A SECOND WAVE OF AGENTS: Spawn a separate team of
               `change-reviewer` (Sonnet) sub-agents to independently audit the changes — correctness,
               regressions, scope creep, accessibility, and the SECURITY INVARIANTS
               below. Fix or revert anything they flag. Not done until reviewers pass.
            5. GATE ON BUILD/LINT/TEST — MANDATORY. From `frontend/`, run:
                 - `npm run lint`
                 - `npm run build`         (this is `tsc && vite build`)
                 - `npx vitest run`        (if a test script exists)
               ALL must pass. If anything fails and you cannot fix it, REVERT
               everything (`git reset --hard HEAD` / `git checkout -- .`) so the live
               site is untouched, then stop and report that you aborted. A red build
               must NEVER reach `main`.
            6. COMMIT + PUSH only if step 5 is fully green. Then print a concise
               summary of what changed and that the live site is redeploying.

            ## SECURITY INVARIANTS — never weaken these
            - Keep the login-session system intact: the `@app.before_request` auth
              guard in `backend/app.py` and the session cookie set at sign in/up in
              `backend/auth.py`. Do not remove or bypass them.
            - Every personal-data endpoint MUST keep deriving the user identity from
              `session["uid"]` — never from a client-supplied `user_id`/`employee_id`.
              Never make an endpoint return or modify another user's data.
            - Never reintroduce the password-reset token into any API response.
            - If you genuinely improve auth, it must be strictly stronger, and the
              reviewer agents must confirm no data-exposure regression.

            ## Hard safety rules
            - Never push if build/lint/tests fail.
            - Do NOT modify deploy/config files: `Dockerfile`, `render.yaml`,
              `.dockerignore`, `start.sh`, `build.sh`, `Procfile`, `railway.toml`,
              `mise.toml`, `backend/requirements.txt`, `backend/init_db.py`, and
              anything under `.github/`. Never commit secrets or `.env` files.
            - Keep total changes for one night modest and reviewable.
            - If you find nothing worth changing, make no commit and say so. Do not
              invent busywork or churn files.
            - MODEL ECONOMY: sub-agents run ONLY as the Haiku/Sonnet agents defined in
              `.claude/agents/`, never as the default top-level model. You (the
              orchestrator) keep consolidation, implementation, the build gate, and
              the push. If tonight's split wasted effort (scout findings mostly noise,
              a focus area always empty) or a cheap tier clearly missed things, append
              one dated bullet to `.claude/orchestration-notes.md` (create if
              missing), read that file at the start of future runs, and include it in
              tonight's commit if you make one. Do not create any other tracking
              files.
