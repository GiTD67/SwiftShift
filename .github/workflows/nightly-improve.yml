name: Nightly Autonomous Site Improvement

# Runs every day at 03:00 America/Denver. GitHub cron is UTC, so 09:00 UTC.
# Adjust the minute/hour below if your timezone offset changes (DST etc.).
on:
  schedule:
    - cron: "0 9 * * *"   # 03:00 MDT (UTC-6) — see note above
  workflow_dispatch: {}    # lets you trigger a run manually from the Actions tab

# Prevent two nightly runs from overlapping if one runs long.
concurrency:
  group: nightly-improve
  cancel-in-progress: false

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write        # push commits to main
      pull-requests: write   # (not used in auto-push mode, kept for flexibility)
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend deps (so agents can build/lint/test)
        working-directory: frontend
        run: npm install

      - name: Configure Git identity
        run: |
          git config --global user.name "swiftshift-nightly[bot]"
          git config --global user.email "swiftshift-nightly@users.noreply.github.com"

      - name: Run autonomous improvement agents
        id: improve
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-opus-4-8
            --max-turns 80
            --allowedTools Bash,Read,Edit,Write,Glob,Grep,Task,TodoWrite
          prompt: |
            You are running fully autonomously in a GitHub Actions runner for the
            SwiftShift repository. There is NO human watching and NO one to approve
            anything. Do not ask questions or wait for confirmation — complete the
            entire job end to end on your own and finish by pushing to `main`.

            ## Read the rules first
            Read `CLAUDE.md` at the repo root and follow it exactly. In particular,
            the deploy contract is: after a confirmed change, run `git add -A`,
            `git commit -m "<concise message>"`, and `git push origin main`. Pushing
            to `main` triggers the live Railway redeploy. Do NOT touch deploy/config
            files (railway.toml, Procfile, start.sh, build.sh,
            backend/requirements.txt, database files) and do NOT commit secrets.

            ## Your mission (do all of it)
            1. EXPLORE: Spawn a team of sub-agents (use the Task tool, run several in
               parallel) to comb through the SwiftShift codebase — frontend
               (React + TypeScript + Vite under `frontend/`) and backend (Flask under
               `backend/`). Have them hunt for concrete, high-value improvements:
               UI/UX polish, accessibility, performance, dead code, obvious bugs,
               error handling, copy/clarity, small feature gaps. Breadth matters —
               cover different areas of the app.
            2. PLAN: Consolidate findings into a short ranked plan of the specific
               changes you will make this run. Prefer a handful of safe, genuinely
               valuable improvements over a large risky rewrite. Make the smallest
               change that delivers each improvement (per CLAUDE.md style).
            3. IMPLEMENT: Make the code changes.
            4. DOUBLE-CHECK WITH A SECOND WAVE OF AGENTS: Spawn a separate team of
               reviewer sub-agents to independently audit the changes the first
               agents made — correctness, regressions, scope creep, anything that
               violates CLAUDE.md. Revert or fix anything they flag. The work is not
               done until the reviewers are satisfied.
            5. GATE ON BUILD/LINT/TEST — THIS IS MANDATORY: From `frontend/`, run:
                 - `npm run lint`
                 - `npm run build`   (this is `tsc && vite build`)
                 - `npm run test` if a test script exists (vitest; run non-watch,
                    e.g. `npx vitest run`)
               ALL of these must pass. If anything fails, fix it. If you cannot get
               them green, DO NOT COMMIT — instead revert your changes
               (`git checkout -- .` / `git reset --hard HEAD`) so the live site is
               left untouched, then stop and clearly report that you aborted.
            6. COMMIT + PUSH (only if step 5 is fully green): stage, commit with a
               clear message summarizing the improvements, and `git push origin main`.
               Then print a concise summary of exactly what changed and that the live
               site is redeploying.

            ## Hard safety rules
            - Never push if the build, lint, or tests are failing. A red build must
              never reach `main`.
            - Keep total changes for one night modest and reviewable.
            - If you find nothing worth changing, that's fine — make no commit and
              say so. Do not invent busywork or churn files for the sake of it.
            - Never modify the deploy/config files listed above. Never commit secrets.
